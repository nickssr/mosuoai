<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" style="background:#232f3e">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#232f3e"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- AWS-like grid lines -->
  <g stroke="#3a4a5e" stroke-width="1" opacity="0.4">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- API call icons -->
  <g transform="translate(200, 280)">
    <circle r="40" fill="#ff9900" opacity="0.9"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#232f3e">1</text>
  </g>
  <g transform="translate(600, 280)">
    <circle r="40" fill="#ff9900" opacity="0.9"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#232f3e">2</text>
  </g>
  <g transform="translate(1000, 280)">
    <circle r="40" fill="#ff9900" opacity="0.9"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#232f3e">3</text>
  </g>
  <!-- Connecting lines -->
  <path d="M250 280 Q425 200 560 280" stroke="#ff9900" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M650 280 Q825 200 960 280" stroke="#ff9900" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Robot/Agent icon top center -->
  <g transform="translate(600, 120)">
    <rect x="-50" y="-40" width="100" height="80" rx="16" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="2"/>
    <circle cx="-20" cy="-5" r="10" fill="#ff9900"/>
    <circle cx="20" cy="-5" r="10" fill="#ff9900"/>
    <rect x="-25" y="15" width="50" height="10" rx="5" fill="#ff9900" opacity="0.8"/>
  </g>
  <!-- Bottom label -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial" font-size="36" font-weight="bold" fill="#ffffff" letter-spacing="2">AWS AgentCore</text>
  <text x="600" y="600" text-anchor="middle" font-family="Arial" font-size="22" fill="#8899aa">3 API Calls to Deploy an AI Agent</text>
</svg>
