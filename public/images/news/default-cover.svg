<svg width="160" height="110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4e0"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="160" height="110" rx="6" fill="url(#bg)"/>
  <!-- 光晕 -->
  <circle cx="120" cy="20" r="40" fill="rgba(0,212,224,0.12)"/>
  <!-- Newspaper 图标 -->
  <g transform="translate(52, 28)" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="44" height="52" rx="3"/>
    <line x1="8" y1="12" x2="36" y2="12"/>
    <line x1="8" y1="20" x2="36" y2="20"/>
    <line x1="8" y1="28" x2="24" y2="28"/>
    <rect x="8" y="36" width="28" height="10" rx="1" stroke-width="1.5"/>
  </g>
  <!-- 底部色条 -->
  <rect x="0" y="98" width="160" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
