<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,212,224,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- 光晕效果 -->
  <circle cx="600" cy="315" r="250" fill="url(#glowGrad)" />

  <!-- 主标题 -->
  <text x="600" y="260" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="#f9fafb" text-anchor="middle" letter-spacing="-2">
    MosuoAI
  </text>

  <!-- 副标题 -->
  <text x="600" y="340" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="500" fill="#9ca3af" text-anchor="middle">
    AI Agent 开发者的深度指南
  </text>

  <!-- 底部装饰线 -->
  <rect x="450" y="420" width="300" height="4" rx="2" fill="#00d4e0" />

  <!-- 网站 URL -->
  <text x="600" y="480" font-family="'JetBrains Mono', monospace" font-size="24" fill="#00d4e0" text-anchor="middle">
    mosuoai.com
  </text>

  <!-- 角落装饰 -->
  <circle cx="80" cy="80" r="40" fill="none" stroke="#00d4e0" stroke-width="2" opacity="0.3" />
  <circle cx="1120" cy="550" r="60" fill="none" stroke="#00d4e0" stroke-width="2" opacity="0.2" />
</svg>
